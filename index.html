    <div class="container">
        <h1>AI小説下読みくん</h1>
        <p>AIが読者視点と編集者視点から、あなたの小説をガチ評価します。</p>

        <textarea id="novel-text" placeholder="ここに小説を貼り付けてください..."></textarea>

        <div class="actions">
            <input type="file" id="novel-file" accept=".txt">
            <button id="analyze-btn">読んでもらう</button>
        </div>



        <div id="loading" class="hidden">
            <div class="loading-spinner"></div>
            <p>精読中...</p>

            <!-- <div class="ad-space-loading">

        </div>

        <!-- <div class="ad-space-inline">

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <div id="result" class="hidden">

            <div class="score-overview">
                <div class="chart-container">
                    <canvas id="scoreChart"></canvas>
                </div>

                <div class="result-header">
                    <h2>総合：<span id="avg-score"></span> / 5.0</h2>
                    <div class="main-star-container">
                        <div id="main-star-rating" class="star-rating" style="--rating-width: 0%">☆☆☆☆☆</div>
                    </div>
                </div>
            </div>

            <!-- <div class="ad-space-inline">
                <div class="ad-placeholder-horizontal">
                    <p class="ad-label">ADVERTISEMENT</p>
                </div>
            </div> -->

            <div id="reader-cards"></div>



            <div class="editor-feedback-area">

                <div class="editor-points">
                    <div class="point-box good">
                        <h3>👍 良い点</h3>
                        <ul id="good-list"></ul>
                    </div>
                    <div class="point-box bad">
                        <h3>⚠️ 悪い点</h3>
                        <ul id="bad-list"></ul>
                    </div>
                </div>

                <div class="editor-section">
                    <h3>今後のヒント</h3>
                    <p id="overall-summary"></p>
                </div>
            </div>

            <div class="save-area">
                <button id="pdf-download-btn">🖼️ 画像(JPG)をダウンロード</button>
            </div>
        </div>

    </div>
